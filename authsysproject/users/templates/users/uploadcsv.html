{% extends 'users/base.html' %}
{% load static %}
{% block content %}
<div>
    <form method="POST" enctype="multipart/form-data" action="{% url 'uploadcsv' %}">
        {% csrf_token %}
        <input type="file" name="csv_file" accept=".csv">
        <button type="submit">Upload CSV</button>
    </form>
</div>
<a href="logout">Logout</a>
{% endblock content %}
